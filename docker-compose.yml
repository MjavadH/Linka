services:
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "bot.main"]
    
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linka
      POSTGRES_USER: linka
      POSTGRES_PASSWORD: linka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linka -d linka"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
